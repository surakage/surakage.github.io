<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlothBloom Sprouts Support</title>
  <style>
    :root { color-scheme: light; --bg:#f7f1df; --card:#fffdf7; --ink:#23483d; --muted:#587068; --accent:#2d7b5f; --line:#d7dfd8; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"Segoe UI",Arial,sans-serif; color:var(--ink); background:linear-gradient(160deg,#edf7e8,var(--bg)); display:grid; place-items:center; padding:24px; }
    main { width:min(760px,100%); padding:36px; background:rgba(255,253,247,.96); border:1px solid var(--line); border-radius:28px; box-shadow:0 20px 55px rgba(35,72,61,.12); }
    .eyebrow { margin:0 0 10px; text-transform:uppercase; letter-spacing:.15em; font-weight:700; color:var(--accent); }
    h1 { margin:0 0 16px; font-size:clamp(2.2rem,6vw,4rem); line-height:1; }
    p { color:var(--muted); line-height:1.65; }
    nav { display:grid; gap:12px; margin-top:28px; }
    a { display:flex; align-items:center; justify-content:center; min-height:52px; padding:12px 18px; border-radius:999px; background:var(--accent); color:white; font-weight:700; text-decoration:none; }
    a.secondary { background:transparent; color:var(--ink); border:1px solid var(--line); }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Sloth Bloom</p>
    <h1>SlothBloom Sprouts</h1>
    <p>A parent-guided early-learning app for children ages 1–5. Find privacy information, account-deletion instructions, and support resources here.</p>
    <nav aria-label="Support links">
      <a href="privacy-policy.html">Privacy policy</a>
      <a class="secondary" href="delete-account.html">Delete an account and app data</a>
      <a class="secondary" href="mailto:support@slothbloom.com?subject=SlothBloom%20Sprouts%20Support">Email support</a>
    </nav>
  </main>
</body>
</html>
