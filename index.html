<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Veyrazo Support</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e7;
      --card: rgba(255, 255, 255, 0.82);
      --text: #173f37;
      --muted: #53736b;
      --accent: #1f7d69;
      --border: rgba(23, 63, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255, 220, 150, 0.65), transparent 30%),
        linear-gradient(180deg, #fbf8f0 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 18px 60px rgba(23, 63, 55, 0.08);
      backdrop-filter: blur(12px);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 0.95;
    }

    p {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }

    a.button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 52px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid rgba(23, 63, 55, 0.22);
    }

    .meta {
      margin-top: 20px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Veyrazo</p>
    <h1>Support and App Verification</h1>
    <p>
      This page is used for Veyrazo support and mobile advertising verification.
      If you were sent here for app-ads.txt validation, the authorized record is available below.
    </p>
    <div class="actions">
      <a class="button" href="/app-ads.txt">Open app-ads.txt</a>
      <a class="button secondary" href="https://play.google.com/store/apps/details?id=com.slothbloom.veyrazo">View Veyrazo on Google Play</a>
    </div>
    <p class="meta">Publisher: surakage.github.io</p>
  </main>
</body>
</html>
