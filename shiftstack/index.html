<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shiftstack Support</title>
  <style>
    :root { color-scheme:dark; --bg:#0e1116; --card:#17202a; --ink:#f0f4f8; --muted:#a7b3c2; --cyan:#38d9ff; --purple:#b56cff; --line:#2b3948; }
    * { box-sizing:border-box; } body { margin:0; min-height:100vh; font-family:"Segoe UI",Arial,sans-serif; color:var(--ink); background:radial-gradient(circle at top right,rgba(181,108,255,.24),transparent 34%),linear-gradient(180deg,#111925,var(--bg)); display:grid; place-items:center; padding:24px; }
    main { width:min(720px,100%); background:rgba(23,32,42,.96); border:1px solid var(--line); border-radius:28px; padding:36px; box-shadow:0 24px 70px rgba(0,0,0,.34); }
    .eyebrow { margin:0 0 12px; color:var(--cyan); font-weight:800; letter-spacing:.16em; text-transform:uppercase; } h1 { margin:0 0 14px; font-size:clamp(2.2rem,7vw,4rem); line-height:1; } p { color:var(--muted); font-size:1.05rem; line-height:1.7; }
    .actions { display:grid; gap:12px; margin-top:28px; } a { color:var(--cyan); } a.button { display:flex; justify-content:center; align-items:center; min-height:52px; border-radius:999px; background:linear-gradient(90deg,var(--cyan),var(--purple)); color:#0e1116; text-decoration:none; font-weight:800; }
  </style>
</head>
<body><main>
  <p class="eyebrow">Sloth Bloom</p>
  <h1>Shiftstack</h1>
  <p>Support and privacy information for Shiftstack, the fast modern falling-block puzzle game for Android.</p>
  <div class="actions"><a class="button" href="privacy-policy.html">Read the Privacy Policy</a></div>
  <p>Questions may be sent to <a href="mailto:support@slothbloom.com?subject=Shiftstack%20Support">support@slothbloom.com</a>.</p>
</main></body>
</html>
